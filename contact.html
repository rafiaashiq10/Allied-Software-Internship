<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Allied Software Engineers</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <img src="https://www.alliedsoftwareengineers.com/logo.png" alt="Logo">

                <h2>Allied Software Engineers</h2>

            </div>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="internship.html">Internship</a></li>

                <li><a href="contact.html" class="active">Contact</a></li>

            </ul>

        </nav>

    </header>

    <!-- Banner -->

    <section class="page-banner">

        <h1>Contact Us</h1>

        <p>Apply for Internship Today</p>

    </section>

    <!-- Contact Form -->

    <section class="contact">

        <form id="contactForm">

            <h2>Internship Application</h2>

            <input type="text" id="fullname" placeholder="Full Name">

            <input type="email" id="email" placeholder="Email Address">

            <input type="text" id="phone" placeholder="Phone Number">

            <input type="text" id="institute" placeholder="Institute Name">

            <select id="domain">

                <option value="">Select Domain</option>

                <option>Web Development</option>

                <option>Artificial Intelligence</option>

                <option>Mobile App Development</option>

                <option>UI / UX Design</option>

                <option>Graphic Designing</option>

            </select>

            <textarea
                id="message"
                rows="6"
                placeholder="Write your message..."></textarea>

            <button type="submit" class="btn">

                Submit Application

            </button>

            <p id="result"></p>

        </form>

    </section>

    <footer>

        <p>

            © 2026 Allied Software Engineers | All Rights Reserved

        </p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
